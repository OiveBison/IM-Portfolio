<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lindiwe Makiri | Contact Me</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/contact.css">
    <script src="js/main.js" defer></script>
</head>
<body class="body">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="assets/makiri logo.png" alt="Logo" width="80" height="80">
            </div>
            
            <div class="nav-menu" id="global-nav">
                </div>
        </div>
    </nav>

    <main class="contact-container">
        
        <header class="contact-header">
            <h2>Contact Me</h2>
            <p>If you have any questions or want to get in touch, please fill out the form below.</p>
        </header>

        <div class="contact-layout">
            <section class="form-section">
                <form id="contactForm">
                    <div id="error-message" class="error-text"></div>
                    
                    <div class="input-group">
                        <label for="fullName">Name and Surname:</label>
                        <input type="text" id="fullName" name="name" required>
                    </div>

                    <div class="input-group">
                        <label for="emailInput">Email Address:</label>
                        <input type="email" id="emailInput" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="messageInput">Message:</label>
                        <textarea id="messageInput" name="message" rows="5" required></textarea>
                    </div>

                    <button type="submit" class="submit-button">Submit</button>
                </form>
            </section>

            <section class="connect-section">
                <h3>My Profiles</h3>
                <p>You can also find me on these platforms:</p>
                
                <ul class="social-list">
                    <li><a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a></li>
                    <li><a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
                    <li><a href="mailto:your.email@example.com">Email Me Directly</a></li>
                </ul>
            </section>
        </div>

    </main>

    <footer class="bottom-footer">
        <div>
            <p>&copy; 2026 | Built by Lindiwe Makiri | Content before Chrome</p>
        </div>
    </footer>

</body>
</html>
